# Workflow de release.
#
# Estado actual: SÓ XERA PRs DE VERSION (non publica en npm).
#
# Para activar publicación:
# 1. Reservar @yggdrasil-forge en npmjs.com
# 2. Crear NPM_TOKEN (tipo "Automation") en npmjs.com
# 3. Engadir como secret NPM_TOKEN no repo de GitHub
# 4. No step "Create Release PR" engadir:
#      publish: pnpm changeset:publish
#    e na sección env: NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      pull-requests: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.0.9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

      - name: Create Release PR
        uses: changesets/action@v1
        with:
          version: pnpm changeset:version
          commit: 'chore: version packages'
          title: 'chore: version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
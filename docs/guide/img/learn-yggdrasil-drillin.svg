<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 450" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <defs>
    <marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M2 2 L8 5 L2 8" fill="none" stroke="#2c6e8f" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="ahb" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M2 2 L8 5 L2 8" fill="none" stroke="#9a6b3f" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <rect width="820" height="450" rx="14" fill="#faf8f2"/>
  <text x="28" y="34" font-size="14" font-weight="700" fill="#1f2933">Drill-in is consumer-side — the same &lt;SkillTree&gt; renders every depth</text>

  <!-- Parent panel -->
  <rect x="36" y="58" width="318" height="300" rx="12" fill="#ffffff" stroke="#e0d8c8" stroke-width="1.2"/>
  <text x="52" y="80" font-size="10.5" fill="#7a7468">parent level</text>
  <text x="52" y="98" font-size="11.5" fill="#2c6e8f" font-style="italic">&lt;SkillTree engine={root} /&gt;</text>

  <rect x="115" y="112" width="160" height="30" rx="8" fill="#e8f0f3" stroke="#2c6e8f" stroke-width="1.6"/>
  <text x="195" y="131" font-size="12" text-anchor="middle" fill="#1f2933" font-weight="600">Core concepts</text>
  <text x="195" y="158" font-size="9.5" text-anchor="middle" fill="#2c6e8f" font-style="italic">double-click to open ↵</text>

  <rect x="115" y="172" width="160" height="28" rx="8" fill="#ffffff" stroke="#7a7468" stroke-width="1.2"/>
  <text x="195" y="190" font-size="12" text-anchor="middle" fill="#1f2933">React rendering</text>
  <rect x="115" y="210" width="160" height="28" rx="8" fill="#ffffff" stroke="#7a7468" stroke-width="1.2"/>
  <text x="195" y="228" font-size="12" text-anchor="middle" fill="#1f2933">Layouts</text>
  <rect x="115" y="248" width="160" height="28" rx="8" fill="#ffffff" stroke="#7a7468" stroke-width="1.2"/>
  <text x="195" y="266" font-size="12" text-anchor="middle" fill="#1f2933">Nesting &amp; composition</text>
  <rect x="115" y="286" width="160" height="28" rx="8" fill="#ffffff" stroke="#7a7468" stroke-width="1.2"/>
  <text x="195" y="304" font-size="12" text-anchor="middle" fill="#1f2933">Capstone</text>

  <!-- enterSubtree arrow parent -> child -->
  <path d="M275 127 C 360 120, 380 122, 462 127" fill="none" stroke="#2c6e8f" stroke-width="1.6" stroke-dasharray="5 4" marker-end="url(#ah)"/>
  <text x="410" y="106" font-size="10" text-anchor="middle" fill="#2c6e8f" font-style="italic">enterSubtree('core')</text>
  <text x="410" y="118" font-size="9" text-anchor="middle" fill="#7a7468">: Result&lt;TreeEngine&gt;</text>

  <!-- Child panel -->
  <rect x="466" y="58" width="318" height="300" rx="12" fill="#ffffff" stroke="#e0d8c8" stroke-width="1.2"/>
  <text x="482" y="80" font-size="10.5" fill="#7a7468">child level — after enterSubtree</text>
  <text x="482" y="98" font-size="11.5" fill="#2c6e8f" font-style="italic">&lt;SkillTree engine={child} /&gt;</text>
  <text x="770" y="98" font-size="9.5" text-anchor="end" fill="#9a6b3f" font-weight="600">same component</text>

  <g stroke="#b8b2a4" stroke-width="1.5" fill="none">
    <path d="M625 142 L625 168"/>
    <path d="M625 200 L625 226"/>
  </g>
  <rect x="545" y="112" width="160" height="30" rx="8" fill="#e8f0f3" stroke="#2c6e8f" stroke-width="1.6"/>
  <text x="625" y="131" font-size="12" text-anchor="middle" fill="#1f2933" font-weight="600">TreeEngine</text>
  <rect x="545" y="170" width="160" height="30" rx="8" fill="#ffffff" stroke="#7a7468" stroke-width="1.2"/>
  <text x="625" y="189" font-size="12" text-anchor="middle" fill="#1f2933">subtree_completion</text>
  <rect x="545" y="228" width="160" height="30" rx="8" fill="#f3ece0" stroke="#9a6b3f" stroke-width="1.4" stroke-dasharray="4 3"/>
  <text x="625" y="247" font-size="12" text-anchor="middle" fill="#1f2933" font-weight="600">Gates ↳</text>
  <text x="625" y="274" font-size="9.5" text-anchor="middle" fill="#9a6b3f">↳ nests gates-deep (level 2)</text>

  <!-- engine stack + breadcrumb (bottom band) -->
  <text x="36" y="392" font-size="10.5" fill="#7a7468">engine stack · breadcrumb:</text>
  <rect x="208" y="378" width="118" height="26" rx="6" fill="#ffffff" stroke="#7a7468" stroke-width="1.2"/>
  <text x="267" y="395" font-size="11" text-anchor="middle" fill="#1f2933">root engine</text>
  <text x="335" y="395" font-size="13" text-anchor="middle" fill="#7a7468">›</text>
  <rect x="346" y="378" width="118" height="26" rx="6" fill="#e8f0f3" stroke="#2c6e8f" stroke-width="1.4"/>
  <text x="405" y="395" font-size="11" text-anchor="middle" fill="#1f2933" font-weight="600">core engine</text>

  <path d="M405 406 C 405 430, 267 430, 267 408" fill="none" stroke="#9a6b3f" stroke-width="1.4" stroke-dasharray="4 3" marker-end="url(#ahb)"/>
  <text x="336" y="444" font-size="9.5" text-anchor="middle" fill="#9a6b3f" font-style="italic">goTo(0) — climb back up</text>

  <text x="498" y="392" font-size="10.5" fill="#7a7468">Public API only · the renderer never changes ·</text>
  <text x="498" y="406" font-size="10.5" fill="#7a7468" font-weight="600">zero @core / @react changes</text>
</svg>

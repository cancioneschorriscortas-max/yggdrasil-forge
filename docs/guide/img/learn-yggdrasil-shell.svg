<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 520" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <defs>
    <marker id="tip" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 2 L8 5 L2 8" fill="none" stroke="#b8b2a4" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <rect width="820" height="520" rx="14" fill="#faf8f2"/>
  <text x="28" y="34" font-size="14" font-weight="700" fill="#1f2933">Anatomy of the polished shell — every region is consumer code</text>

  <!-- App shell frame -->
  <rect x="36" y="56" width="556" height="436" rx="12" fill="#ffffff" stroke="#7a7468" stroke-width="1.4"/>
  <text x="50" y="74" font-size="10" fill="#9a6b3f" font-weight="700">.ly-shell</text>

  <!-- ly-hud -->
  <rect x="52" y="82" width="524" height="72" rx="8" fill="#f7f4ec" stroke="#e0d8c8" stroke-width="1"/>
  <text x="66" y="98" font-size="9.5" fill="#2c6e8f" font-weight="700">.ly-hud</text>
  <text x="66" y="118" font-size="13" font-weight="700" fill="#1f2933">Learn Yggdrasil Forge</text>
  <text x="66" y="135" font-size="10.5" fill="#7a7468">Core concepts: 1/3 lessons · 33%</text>
  <rect x="66" y="142" width="340" height="7" rx="3.5" fill="#ece8df"/>
  <rect x="66" y="142" width="112" height="7" rx="3.5" fill="#2c6e8f"/>

  <!-- ly-crumb -->
  <rect x="52" y="162" width="524" height="34" rx="8" fill="#f7f4ec" stroke="#e0d8c8" stroke-width="1"/>
  <text x="66" y="176" font-size="9.5" fill="#2c6e8f" font-weight="700">.ly-crumb</text>
  <text x="66" y="190" font-size="11.5" fill="#2c6e8f">Course</text>
  <text x="120" y="190" font-size="11.5" fill="#7a7468">›</text>
  <text x="132" y="190" font-size="11.5" fill="#1f2933" font-weight="600">Core concepts</text>

  <!-- ly-select -->
  <rect x="52" y="204" width="524" height="118" rx="8" fill="#f7f4ec" stroke="#e0d8c8" stroke-width="1"/>
  <text x="66" y="220" font-size="9.5" fill="#2c6e8f" font-weight="700">.ly-select</text>
  <text x="66" y="238" font-size="12" fill="#1f2933" font-weight="600">Core concepts</text>
  <text x="66" y="256" font-size="9.5" fill="#7a7468">one of three states, by node:</text>
  <!-- state a: progress -->
  <text x="66" y="276" font-size="10.5" fill="#1f2933">• open anchor → progress  1/3 · 33%</text>
  <!-- state b: conditions -->
  <text x="66" y="294" font-size="10.5" fill="#1f2933">• locked → conditions</text>
  <text x="196" y="294" font-size="10.5" fill="#2c6e8f" font-weight="700">✓</text>
  <text x="208" y="294" font-size="10.5" fill="#1f2933">Core 80%</text>
  <text x="270" y="294" font-size="10.5" fill="#b04a3a" font-weight="700">✗</text>
  <text x="282" y="294" font-size="10.5" fill="#1f2933">Layouts 80%</text>
  <!-- state c: open button -->
  <text x="66" y="312" font-size="10.5" fill="#1f2933">• unlocked anchor →</text>
  <rect x="186" y="301" width="118" height="16" rx="8" fill="#2c6e8f"/>
  <text x="245" y="313" font-size="10" text-anchor="middle" fill="#ffffff" font-weight="600">Open Core concepts →</text>

  <!-- ly-canvas -->
  <rect x="52" y="330" width="524" height="150" rx="8" fill="#f7f4ec" stroke="#e0d8c8" stroke-width="1"/>
  <text x="66" y="346" font-size="9.5" fill="#2c6e8f" font-weight="700">.ly-canvas → &lt;SkillTree&gt;</text>
  <!-- mini tree -->
  <g stroke="#b8b2a4" stroke-width="1.4" fill="none">
    <path d="M314 372 L230 404"/>
    <path d="M314 372 L398 404"/>
    <path d="M230 432 L230 446"/>
  </g>
  <rect x="264" y="356" width="100" height="26" rx="8" fill="#e8f0f3" stroke="#2c6e8f" stroke-width="1.5"/>
  <text x="314" y="373" font-size="10.5" text-anchor="middle" fill="#1f2933" font-weight="600">TreeEngine</text>
  <rect x="182" y="404" width="96" height="26" rx="8" fill="#f3ece0" stroke="#9a6b3f" stroke-width="1.3"/>
  <text x="230" y="421" font-size="10.5" text-anchor="middle" fill="#1f2933">Gates ↳</text>
  <rect x="350" y="404" width="96" height="26" rx="8" fill="#ffffff" stroke="#7a7468" stroke-width="1.2"/>
  <text x="398" y="421" font-size="10.5" text-anchor="middle" fill="#1f2933">subtree_…</text>
  <rect x="182" y="446" width="96" height="24" rx="8" fill="#d6d3cb" stroke="#7a7468" stroke-width="1"/>
  <text x="230" y="462" font-size="10" text-anchor="middle" fill="#1f2933">locked</text>
  <text x="470" y="372" font-size="9.5" fill="#7a7468">single click = select</text>
  <text x="470" y="388" font-size="9.5" fill="#7a7468">double-click ≤300ms</text>
  <text x="470" y="402" font-size="9.5" fill="#7a7468">= open anchor</text>
  <text x="470" y="424" font-size="9.5" fill="#9a6b3f">maxLabelChars: 14</text>
  <text x="470" y="438" font-size="9.5" fill="#9a6b3f">(truncates labels)</text>

  <!-- right annotation column: public API per region -->
  <text x="620" y="74" font-size="10.5" fill="#1f2933" font-weight="700">public API per region</text>

  <line x1="576" y1="118" x2="612" y2="118" stroke="#b8b2a4" stroke-width="1" stroke-dasharray="3 3" marker-end="url(#tip)"/>
  <text x="618" y="110" font-size="9.5" fill="#7a7468">HUD progress:</text>
  <text x="618" y="123" font-size="9.5" fill="#2c6e8f" font-style="italic">currentProgress(engine)</text>

  <line x1="576" y1="179" x2="612" y2="179" stroke="#b8b2a4" stroke-width="1" stroke-dasharray="3 3" marker-end="url(#tip)"/>
  <text x="618" y="171" font-size="9.5" fill="#7a7468">breadcrumb:</text>
  <text x="618" y="184" font-size="9.5" fill="#2c6e8f" font-style="italic">stack · goTo(i)</text>

  <line x1="576" y1="262" x2="612" y2="262" stroke="#b8b2a4" stroke-width="1" stroke-dasharray="3 3" marker-end="url(#tip)"/>
  <text x="618" y="246" font-size="9.5" fill="#7a7468">selection bar:</text>
  <text x="618" y="259" font-size="9.5" fill="#2c6e8f" font-style="italic">explainUnlock(id)</text>
  <text x="618" y="272" font-size="9.5" fill="#2c6e8f" font-style="italic">subtreeProgress(id)</text>

  <line x1="576" y1="405" x2="612" y2="405" stroke="#b8b2a4" stroke-width="1" stroke-dasharray="3 3" marker-end="url(#tip)"/>
  <text x="618" y="389" font-size="9.5" fill="#7a7468">tree render:</text>
  <text x="618" y="402" font-size="9.5" fill="#2c6e8f" font-style="italic">onNodeClick(id)</text>
  <text x="618" y="415" font-size="9.5" fill="#2c6e8f" font-style="italic">ThemeProvider</text>
  <text x="618" y="428" font-size="9.5" fill="#7a7468">+ unlock / enterSubtree</text>

  <text x="28" y="508" font-size="10.5" fill="#7a7468">Public API only — @core and @react are unchanged. The shell is plain consumer code (~260 lines).</text>
</svg>

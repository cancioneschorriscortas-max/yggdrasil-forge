<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Yggdrasil Editor</title>
    <script>
      // ── 7.8: anti-flash ──
      // Le o tema gardado (se hai) ANTES de que cargue React/CSS dos
      // paquetes, para que o primeiro pintado xa amose o tema correcto
      // sen flash do contrario.
      try {
        var t = localStorage.getItem('ygg-editor-theme');
        if (t === 'dark') document.documentElement.dataset.editorTheme = 'dark';
      } catch (e) {}
    </script>
    <style>
      /* Base pre-hidratación: reset + fallback marfil (o default do
       * tema en 7.5d). As cores canónicas veñen dos tokens de
       * @editor-react (ver theme/tokens.css); estas de aquí só
       * previñen o flash mentres o CSS carga. Os hex duplican tokens
       * adrede: neste punto o CSS dos paquetes aínda non cargou.
       */
      html, body, #root { margin: 0; padding: 0; height: 100%; }
      body {
        background: #fbfbfa; /* --editor-bg-shell (marfil) literal */
        color: #2b2b28;      /* --editor-text-primary literal */
        font-family: 'Inter', system-ui, sans-serif;
        -webkit-font-smoothing: antialiased;
      }
      [data-editor-theme='dark'] body {
        background: #0f1013; /* --editor-bg-shell (escuro) literal */
        color: #e8e9ea;      /* --editor-text-primary (escuro) literal */
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
